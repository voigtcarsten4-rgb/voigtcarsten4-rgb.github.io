<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#1A1413" />
  <meta name="description" content="Bell FastLane Crew-Ansicht – Kitchen Display System (Demo)." />
  <title>Bell FastLane · Crew &amp; Kasse</title>
  <link rel="icon" href="assets/img/favicon.svg" />
  <link rel="stylesheet" href="assets/css/bell.css" />
</head>
<body>

  <header class="appbar">
    <div class="container inner">
      <a class="bell-logo" href="index.html" aria-label="Bell FastLane">
        <span class="bell-mark sm">Bell</span>
        <span class="sub">Fast<b>Lane</b></span>
      </a>
      <span class="role-tag">👨‍🍳 Crew / Kasse</span>
      <span class="spacer"></span>
      <span class="pill" id="staff-event" style="font-weight:700"></span>
      <span class="demo-flag"><span class="dot"></span>DEMO</span>
    </div>
  </header>

  <div class="container kds-wrap">
    <div class="kds-toolbar">
      <div class="kds-stat"><div class="v num" id="st-new">0</div><div class="l">Neu</div></div>
      <div class="kds-stat"><div class="v num" id="st-work">0</div><div class="l">In Arbeit</div></div>
      <div class="kds-stat"><div class="v num" id="st-ready">0</div><div class="l">Abholbereit</div></div>
      <div class="kds-stat"><div class="v num" id="st-rev">CHF 0</div><div class="l">Umsatz heute (Demo)</div></div>
      <span class="spacer"></span>
      <button class="btn btn-ghost btn-sm" id="btn-demo-order"></button>
      <a class="btn btn-dark btn-sm" href="admin.html">📊 Admin</a>
    </div>

    <div class="kds-board" id="board"></div>
  </div>

  <div class="scrim" id="scrim"></div>
  <aside class="drawer" id="drawer" aria-label="Kundenchat">
    <div class="d-head">
      <div><div class="t-eyebrow">Kundenchat</div><strong id="drawer-pickup" style="font-size:var(--fs-lg)">—</strong></div>
      <button class="icon-btn" id="drawer-close" aria-label="Schliessen"></button>
    </div>
    <div class="d-body" id="drawer-body"></div>
    <div class="d-foot">
      <div class="quick-msgs" id="staff-quick" style="margin-bottom:10px"></div>
      <div class="chat-input">
        <input type="text" id="staff-msg" placeholder="Antwort an den Gast…" maxlength="140" />
        <button class="chat-send" id="staff-send" aria-label="Senden"></button>
      </div>
    </div>
  </aside>

  <footer class="foot no-print">
    <div>Bell FastLane · <strong>Interne Demo / Prototyp</strong> · Kitchen Display System</div>
    <div class="role-switch">
      <a href="index.html">🛒 Gast</a>
      <a href="staff.html">👨‍🍳 Crew / Kasse</a>
      <a href="admin.html">📊 Admin</a>
    </div>
  </footer>

  <script src="https://cdn.jsdelivr.net/npm/gsap@3.12.5/dist/gsap.min.js"></script>
  <script src="assets/js/store.js"></script>
  <script src="assets/js/ui.js"></script>
  <script src="assets/js/staff.js"></script>
  <script src="assets/js/motion.js"></script>
</body>
</html>
